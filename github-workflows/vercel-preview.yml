# Vercel Deployment Workflow
  #
  # Push deploy is enabled. Keep .github/workflows/vercel-preview.yml and github-workflows/vercel-preview.yml in parity.
  #
  # SETUP REQUIRED before enabling push-based auto-deploy:
  # 1. Create a Vercel project connected to this GitHub repo (see VERCEL_DEPLOY.md)
  # 2. Add the following secrets in GitHub → Settings → Secrets → Actions:
  #    - VERCEL_TOKEN    (durable classic token from the Vercel scope that owns this project)
  #    - VERCEL_ORG_ID   (vercel.com → Settings → General → Team/Personal account ID)
  #    - VERCEL_PROJECT_ID (vercel.com → Project → Settings → General → Project ID)
  # 3. Validate the token before saving it:
  #    - vercel whoami --token "$TOKEN"
  #    - VERCEL_ORG_ID=<id> VERCEL_PROJECT_ID=<id> vercel pull --yes --environment=production --token "$TOKEN"
  # 4. Save with `printf '%s' "$TOKEN" | gh secret set VERCEL_TOKEN ...`
  #    Do not use printf '%s\n'; Vercel CLI rejects token secrets containing newlines.
  #
  # HOW TO FIND VERCEL IDs:
  #   Run `vercel link` in the project root locally → check .vercel/project.json
  #   OR visit your Vercel project dashboard → Settings → General
  #
  # ENABLING AUTO-DEPLOY ON PUSH:
  #   After adding secrets, uncomment the `push` trigger block below.

  name: Deploy to Vercel

  on:
    push:
      branches:
        - main
    workflow_dispatch:

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: 10

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 22
            cache: pnpm

        - name: Validate Vercel credentials
          env:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          run: |
            for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
              if [ -z "${!name}" ]; then
                echo "::error::$name is not configured in GitHub Actions secrets"
                exit 1
              fi
            done

            case "$VERCEL_TOKEN" in
              *$'\n'*|*$'\r'*)
                echo "::error::VERCEL_TOKEN contains a newline; set it with printf '%s', not printf '%s\\n'"
                exit 1
                ;;
            esac

            pnpm dlx vercel@latest whoami --token "$VERCEL_TOKEN" >/dev/null
            pnpm dlx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

        - name: Install dependencies
          run: pnpm install --frozen-lockfile

        - name: Build
          run: pnpm --filter @workspace/strategy-dashboard run build
          env:
            NODE_ENV: production

        - name: Deploy to Vercel
          env:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          run: pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
