<svg width="180" height="180" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#0c0f18"/>
  <!-- Input markers: incoming signal flowing into the left vertex -->
  <line x1="1" y1="17" x2="5" y2="17" stroke="#68d6ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1" y1="21" x2="5" y2="21" stroke="#68d6ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1" y1="25" x2="5" y2="25" stroke="#68d6ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diamond: flowchart decision node = music notehead -->
  <polygon points="16,13 24,21 16,29 8,21" fill="#68d6ff"/>
  <!-- Stem -->
  <line x1="16" y1="13" x2="16" y2="4" stroke="#68d6ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Flag: eighth-note curl -->
  <path d="M 16,4 Q 26,7 22,15" stroke="#68d6ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Algorithm branches: yes/no decision paths -->
  <line x1="8" y1="21" x2="2" y2="29" stroke="#68d6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="30" y2="29" stroke="#68d6ff" stroke-width="2" stroke-linecap="round"/>
</svg>
